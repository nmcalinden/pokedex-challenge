services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pokedex
      POSTGRES_PASSWORD: pokedex
      POSTGRES_DB: pokedex
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokedex"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot migration runner. It scans the whole database/ folder, so a single
  # Flyway run applies both the versioned schema migrations (migrations/) and the
  # local mock-data seed (local-data-seed/). In CI/production, point Flyway at
  # database/migrations only so the local seed is never applied.
  #
  # The API and UI are NOT run here — they run natively (see `make dev`). Docker
  # only provides the database and migrations.
  flyway:
    image: flyway/flyway:11-alpine
    command: -connectRetries=10 migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/pokedex
      FLYWAY_USER: pokedex
      FLYWAY_PASSWORD: pokedex
      FLYWAY_LOCATIONS: filesystem:/flyway/database
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - ./database:/flyway/database:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
